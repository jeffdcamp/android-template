name: Build

# Reusable build/test/deploy workflow shared by the pr, alpha, beta, and release callers.
# Each caller selects a build variant and toggles which deploy steps run.

on:
  workflow_call:
    inputs:
      variant:
        description: 'Build variant to assemble (Alpha, Beta, Release)'
        required: true
        type: string
      detektTask:
        description: 'Variant-specific detekt task (e.g. detektDebug, detektBeta, detektRelease)'
        required: true
        type: string
      appDistribution:
        description: 'Upload the build to Firebase App Distribution'
        required: false
        default: false
        type: boolean
      playStore:
        description: 'Publish the bundle to the Play Store'
        required: false
        default: false
        type: boolean
      incrementVersionCode:
        description: 'Read/increment/persist a cached version code (release flow)'
        required: false
        default: false
        type: boolean
      uploadOutputs:
        description: 'Upload app/build/outputs as an artifact'
        required: false
        default: false
        type: boolean
      minVersionCode:
        description: 'Minimum version code when incrementing'
        required: false
        default: 1013
        type: number

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    # GRADLE_OPTS do not impact the JVM used by the daemon to do the actual builds (gradle.properties is where you configure the daemon's JVM).
    # This only impacts the configuration of the JVM that runs the gradle client. MaxMetaspaceSize is unbounded by default, which leads to a
    # condition where the unbounded metaspace allocations starve some other component of the build, and the gradle daemon disappears.
    # https://docs.gradle.org/current/userguide/build_environment.html#sec:gradle_environment_variables
    # https://stackoverflow.com/a/69348586/2476068
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-XX:MaxMetaspaceSize=2g"

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache version code
        if: ${{ inputs.incrementVersionCode }}
        uses: actions/cache@v4
        with:
          path: version.cache
          key: version-code

      - name: Read, increment, create version code environment variable
        if: ${{ inputs.incrementVersionCode }}
        env:
          MIN_VERSION_CODE: ${{ inputs.minVersionCode }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          # Get version code from cache or initialize it
          if [ ! -f version.cache ]; then
            echo "version.cache not found, initializing."
            echo "$MIN_VERSION_CODE" > version.cache
          fi

          # Read the version code from the cache
          VERSION_FROM_CACHE=$(cat version.cache)

          # Calculate the new version code and store it in a shell variable
          NEW_VERSION_CODE=$(($VERSION_FROM_CACHE + 1))

          # Determine the effective version code
          if [ "$MIN_VERSION_CODE" -gt "$NEW_VERSION_CODE" ]; then
            VERSION_CODE=$MIN_VERSION_CODE
          else
            VERSION_CODE=$NEW_VERSION_CODE
          fi

          # Create GitHub environment variables
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Setup
        env:
          ENCODED_STRING: ${{ secrets.UPLOAD_KEYSTORE }}
          APP_DISTRIBUTION_KEYS: ${{ secrets.APP_DISTRIBUTION_KEYS }}
          PLAYSTORE_KEYS: ${{ secrets.PLAYSTORE_KEYS }}
        run: |
          git log --date=format:"%Y-%m-%d" --pretty="format: * %s% b (%an, %cd)" | head -n 10 > commit-changelog.txt
          echo "$ENCODED_STRING" | base64 -d -i > app/upload-keystore
          echo "$APP_DISTRIBUTION_KEYS" > app-distribution.json
          echo "$PLAYSTORE_KEYS" > playstore.json

      - name: License
        run: ./gradlew createLicenseReport

      - name: Build
        run: ./gradlew clean assemble${{ inputs.variant }} bundle${{ inputs.variant }}
        env:
          SIGNING_KEYSTORE: upload-keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.UPLOAD_SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.UPLOAD_SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.UPLOAD_SIGNING_KEY_PASSWORD }}

      - name: Test
        run: ./gradlew test jvmTest

      - name: Lint
        run: ./gradlew lint

      - name: Detekt
        run: ./gradlew detekt ${{ inputs.detektTask }}

      - name: App Distribution
        if: ${{ inputs.appDistribution }}
        run: ./gradlew appDistributionUpload${{ inputs.variant }}

      - name: Deploy to Play Store
        if: ${{ inputs.playStore }}
        env:
          ANDROID_PUBLISHER_CREDENTIALS: ${{ secrets.PLAYSTORE_KEYS }}
          VARIANT: ${{ inputs.variant }}
        run: ./gradlew "publish${VARIANT}Bundle" --artifact-dir "app/build/outputs/bundle/${VARIANT,,}"

      - name: Persist version code
        if: ${{ inputs.incrementVersionCode }}
        run: |
          echo "Persisting version code ${{ env.VERSION_CODE }} to version.cache"
          echo "${{ env.VERSION_CODE }}" > version.cache

      - name: Upload artifact
        if: ${{ inputs.uploadOutputs }}
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: app/build/outputs

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/licenses/*.html
            **/build/test-results/**/TEST-*.xml
            app/build/reports/*.html
            */build/reports/detekt/*.html
